services:
  db:
    image: pgvector/pgvector:pg17
    container_name: career-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: career_ai
    ports:
      - "5432:5432"
    volumes:
      - ./docker/local-database:/var/lib/postgresql/data
  api:
    depends_on:
      - db
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      DB_URL: postgres://postgres:password@db:5432/career_ai