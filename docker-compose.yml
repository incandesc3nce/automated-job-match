services:
  db:
    image: pgvector/pgvector:pg17
    container_name: career-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: career_ai
    ports:
      - '5432:5432'
    volumes:
      - ./docker/local-database:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: career-ai-redis
    ports:
      - '6379:6379'
    volumes:
      - ./docker/local-redis:/data
    restart: unless-stopped

  api:
    depends_on:
      - db
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '5000:5000'
    environment:
      DB_URL: postgres://postgres:password@db:5432/career_ai

  llm-worker:
    depends_on:
      - db
      - redis
    build:
      context: .
      dockerfile: apps/llm-worker/Dockerfile
    environment:
      DB_URL: postgres://postgres:password@db:5432/career_ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLM_PROVIDER: lmstudio
      LM_STUDIO_BASE_URL: http://host.docker.internal:1234
